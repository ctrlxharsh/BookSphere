[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "api"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Support SPA routing (redirect all non-file requests to index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
